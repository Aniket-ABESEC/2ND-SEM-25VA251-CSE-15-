<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h2>Java Script</h2>
    <script>
        /* js variables ----- container that keeps eiher a
         number, string, boolean, array, object or function
         var, let, const  */
    
         // using var keyword
         var myName= "Aniket";

         /*  The document object in JavaScript represents the web page loaded in
          the browser and serves as an entry point into the web page's content, */


         document.write(myName); // output in browers
         console.log(myName);  // output in console

         function hello(){
            var msg="thanks to visit!";
            console.log(msg);
         }
         hello();

         //  variable declration using let and const
         let myRollno = 202501011375;
         console.log(myRollno);

          myRollno = 202501011375;  // no redeclre but can re-assign
         console.log(myRollno);

         const myPhoneno = 7661928024;
         console.log("my phone number is "+myPhoneno);
         /* in the const no declaretion no re-assign; */
         
    </script>
    
</body>
